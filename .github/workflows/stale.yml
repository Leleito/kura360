name: Stale Issues

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            activity in the last 30 days. It will be closed in 7 days if no further
            activity occurs. Remove the `stale` label to keep it open.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            activity in the last 14 days. It will be closed in 7 days if no further
            activity occurs.
          days-before-stale: 30
          days-before-close: 7
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'P0,security'
          exempt-pr-labels: 'P0'
