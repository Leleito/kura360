name: Supabase Type Generation

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Generate types
        run: |
          supabase gen types typescript \
            --project-id "$SUPABASE_PROJECT_REF" \
            > src/lib/database.types.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Check for changes
        id: diff
        run: |
          git diff --exit-code src/lib/database.types.ts || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create PR if types changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/update-supabase-types-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add src/lib/database.types.ts
          git commit -m "chore: update Supabase database types"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: update Supabase database types" \
            --body "Auto-generated by weekly Supabase type generation workflow." \
            --base master \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
